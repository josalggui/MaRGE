job:
  codespec:
    image: acr-proxy.tyger.cloud/eminence.azurecr.io/tinker:b3e3042-cuda-amd64
    buffers:
      inputs:
        - input
      outputs:
        - noisecovariance
    args:
      - "noise"
      - "--input"
      - "$(INPUT_PIPE)"
      - "--noise.noise-covariance"
      - "$(NOISECOVARIANCE_PIPE)"
    resources:
      requests:
        cpu: 1
